services:
  backend: 
    build: ./backend
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_started
  nginx:
    image: nginx:1.30.0-alpine
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
    ports:
      - "3000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./frontend:/usr/share/nginx/html 
    depends_on:
      backend:
        condition: service_started

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD","redis-cli", "ping"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
      
volumes:
  db-volume: