events{
    worker_connections 1024;
}

http{  
    resolver 127.0.0.11 valid=30s;
    
    server {
        listen 80;

        location /api/ {
            proxy_pass http://backend:3000/;
        }

        location / {
            root /usr/share/nginx/html;
            index index.html;
        }
    }
}